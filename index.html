<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Growth Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar card">
      <div>
        <p class="eyebrow">Self-Improvement System</p>
        <h1>Personal Development Dashboard</h1>
      </div>
      <div class="header-actions">
        <button id="themeToggle" class="btn secondary">🌙 Dark</button>
        <button id="exportData" class="btn secondary">Export JSON</button>
      </div>
    </header>

    <section class="stats-grid">
      <article class="card stat-card">
        <p>Daily Completion</p>
        <h2 id="dailyCompletion">0%</h2>
      </article>
      <article class="card stat-card">
        <p>Total Points</p>
        <h2 id="totalPoints">0</h2>
      </article>
      <article class="card stat-card">
        <p>Level</p>
        <h2 id="levelDisplay">1</h2>
      </article>
      <article class="card stat-card">
        <p>Best Streak</p>
        <h2 id="bestStreak">0 days</h2>
      </article>
    </section>

    <main class="main-grid">
      <section class="card panel">
        <div class="panel-head">
          <h3>Daily Habit Tracker</h3>
          <span id="todayDate"></span>
        </div>
        <div id="habitList" class="habit-list"></div>
      </section>

      <section class="card panel">
        <div class="panel-head">
          <h3>Add Custom Habit</h3>
        </div>
        <form id="habitForm" class="stack-form">
          <label>
            Habit name
            <input type="text" id="habitName" required placeholder="e.g., 20 min exercise" />
          </label>
          <label>
            Daily goal (optional number)
            <input type="number" id="habitGoal" min="1" placeholder="Leave empty for checkbox habit" />
          </label>
          <button type="submit" class="btn">Add Habit</button>
        </form>
      </section>

      <section class="card panel">
        <div class="panel-head">
          <h3>Performance Dashboard</h3>
        </div>
        <div class="chart-wrap">
          <canvas id="weeklyChart"></canvas>
        </div>
        <div class="chart-wrap">
          <canvas id="streakChart"></canvas>
        </div>
      </section>

      <section class="card panel">
        <div class="panel-head">
          <h3>Growth Journal</h3>
        </div>
        <label>
          Date
          <input type="date" id="journalDate" />
        </label>
        <textarea id="journalText" rows="5" placeholder="Write daily reflection..."></textarea>
        <button id="saveJournal" class="btn">Save Reflection</button>
        <div id="journalHistory" class="journal-history"></div>
      </section>

      <section class="card panel full-width">
        <div class="panel-head">
          <h3>Calendar & Badges</h3>
        </div>
        <div id="badgeList" class="badge-list"></div>
        <div id="calendar" class="calendar"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
